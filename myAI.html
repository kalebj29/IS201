<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackjack - Core Rules</title>
  <style>
    :root {
      --bg: #0a1a2f;
      --table: radial-gradient(circle at top, #1e4fa3 0%, #143a7a 45%, #0b2450 100%);
      --panel: rgba(255, 255, 255, 0.1);
      --panel-border: rgba(255, 255, 255, 0.15);
      --text: #f6f7f8;
      --muted: #c9d0d4;
      --accent: #6bbcff;
      --danger: #ff3b3b;
      --card-bg: linear-gradient(145deg, #ffffff, #eef2f5);
      --shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      --success-outline: rgba(121, 240, 167, 0.85);
      --push-outline: rgba(255, 215, 90, 0.9);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .game {
      min-height: 100vh;
      background: var(--table);
      padding: 24px;
      position: relative;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .timer-box, .controls-panel, .message, .scoreboard {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .timer-box {
      padding: 12px 18px;
      min-width: 170px;
      text-align: center;
    }

    .timer-label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .timer-value {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .controls-panel, .scoreboard, .message {
      padding: 18px;
    }

    .controls-panel h2, .scoreboard h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
      color: var(--accent);
    }

    button {
      font: inherit;
      border-radius: 12px;
      border: none;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      width: 100%;
      background: linear-gradient(135deg, #9ed2ff, #4c98f5);
      color: #08213f;
      margin-bottom: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hit-btn {
      background: linear-gradient(135deg, #85d8ff, #4ea9ff);
      color: #06213b;
    }

    .stand-btn {
      background: linear-gradient(135deg, #b6cfff, #6f98ff);
      color: #101f4d;
    }

    .message {
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 900;
      color: white;
    }

    .table-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .seat {
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .seat-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .seat-title {
      font-size: 1.1rem;
      font-weight: 800;
    }

    .seat-score {
      background: rgba(255,255,255,0.14);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      color: var(--accent);
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 150px;
      align-items: center;
    }

    .card {
      width: 94px;
      height: 132px;
      background: var(--card-bg);
      color: #1c232b;
      border-radius: 16px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
      position: relative;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: deal 0.22s ease;
      overflow: hidden;
    }

    .card.red { color: #be1e2d; }
    .card.black { color: #1d2430; }

    .corner {
      font-weight: 900;
      font-size: 1rem;
      line-height: 1;
    }

    .suit {
      font-size: 1rem;
    }

    .card-center {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .player-seat {
      border: 2px solid rgba(107, 188, 255, 0.55);
      background: rgba(0, 0, 0, 0.26);
    }

    .dealer-seat {
      border: 2px solid rgba(255, 255, 255, 0.22);
    }

    .winner {
      outline: 3px solid var(--success-outline);
    }

    .push {
      outline: 3px solid var(--push-outline);
    }

    .bust {
      opacity: 0.76;
    }

    .countdown-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
      font-size: clamp(5rem, 20vw, 11rem);
      font-weight: 900;
      color: var(--danger);
      text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 0 38px rgba(255, 59, 59, 0.5);
    }

    .countdown-overlay.show {
      display: flex;
      animation: pulseFlash 1s steps(2, end) infinite;
    }

    .rules {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
      margin: 0;
    }

    .hidden-card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: repeating-linear-gradient(135deg, #163a63 0 12px, #295a91 12px 24px);
      border: 3px solid rgba(255,255,255,0.85);
    }

    .hidden-card-symbol {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 2rem;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    @keyframes pulseFlash {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.15; transform: scale(1.12); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes deal {
      from { opacity: 0; transform: translateY(-12px) rotate(-4deg) scale(0.96); }
      to { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .cards {
        min-height: 132px;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="top-bar">
      <div class="title">Blackjack</div>
      <div class="timer-box">
        <span class="timer-label">Decision Timer</span>
        <span class="timer-value" id="timerValue">30</span>
      </div>
    </div>

    <div class="layout">
      <aside class="left-column">
        <section class="controls-panel">
          <h2>Round Controls</h2>
          <button class="primary" id="startGameBtn">Start Round</button>
          <div class="actions">
            <button class="hit-btn" id="hitBtn" disabled>Hit</button>
            <button class="stand-btn" id="standBtn" disabled>Stand</button>
          </div>
        </section>

        <section class="scoreboard">
          <h2>Status</h2>
          <p class="rules" id="statusText">Core blackjack only: one player versus the dealer. Start a round to begin. You have 30 seconds to hit or stand.</p>
        </section>

        <section class="message" id="messageBox">Press Start Round to play.</section>
      </aside>

      <main class="table-area" id="tableArea"></main>
    </div>
  </div>

  <div class="countdown-overlay" id="countdownOverlay">10</div>

  <script>
    const suits = [
      { symbol: '♠', color: 'black' },
      { symbol: '♥', color: 'red' },
      { symbol: '♦', color: 'red' },
      { symbol: '♣', color: 'black' }
    ];

    const ranks = [
      { label: 'A', value: 11 },
      { label: '2', value: 2 },
      { label: '3', value: 3 },
      { label: '4', value: 4 },
      { label: '5', value: 5 },
      { label: '6', value: 6 },
      { label: '7', value: 7 },
      { label: '8', value: 8 },
      { label: '9', value: 9 },
      { label: '10', value: 10 },
      { label: 'J', value: 10 },
      { label: 'Q', value: 10 },
      { label: 'K', value: 10 }
    ];

    const state = {
      deck: [],
      dealer: null,
      player: null,
      roundActive: false,
      timer: 30,
      timerId: null,
      roundResolved: false,
      dealerHoleHidden: true,
      result: null
    };

    const startGameBtn = document.getElementById('startGameBtn');
    const hitBtn = document.getElementById('hitBtn');
    const standBtn = document.getElementById('standBtn');
    const tableArea = document.getElementById('tableArea');
    const messageBox = document.getElementById('messageBox');
    const statusText = document.getElementById('statusText');
    const timerValue = document.getElementById('timerValue');
    const countdownOverlay = document.getElementById('countdownOverlay');

    function createDeck() {
      const deck = [];
      for (const suit of suits) {
        for (const rank of ranks) {
          deck.push({
            suit: suit.symbol,
            color: suit.color,
            rank: rank.label,
            value: rank.value
          });
        }
      }
      return shuffle(deck);
    }

    function shuffle(deck) {
      const array = [...deck];
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function drawCard() {
      if (state.deck.length === 0) {
        state.deck = createDeck();
      }
      return state.deck.pop();
    }

    function createHand(name, isPlayer = false, isDealer = false) {
      return {
        name,
        isPlayer,
        isDealer,
        cards: [drawCard(), drawCard()],
        score: 0,
        busted: false,
        blackjack: false,
        winner: false,
        push: false
      };
    }

    function calculateScore(hand) {
      let total = 0;
      let aces = 0;

      for (const card of hand.cards) {
        total += card.value;
        if (card.rank === 'A') {
          aces += 1;
        }
      }

      while (total > 21 && aces > 0) {
        total -= 10;
        aces -= 1;
      }

      hand.score = total;
      hand.busted = total > 21;
      hand.blackjack = hand.cards.length === 2 && total === 21;
      return total;
    }

    function renderCard(card, hidden = false) {
      if (hidden) {
        return `
          <div class="card">
            <div class="hidden-card-face"></div>
            <div class="hidden-card-symbol">★</div>
          </div>
        `;
      }

      return `
        <div class="card ${card.color}">
          <div class="corner">${card.rank}<div class="suit">${card.suit}</div></div>
          <div class="card-center">${card.suit}</div>
          <div class="corner" style="align-self:flex-end; text-align:right; transform: rotate(180deg);">${card.rank}<div class="suit">${card.suit}</div></div>
        </div>
      `;
    }

    function renderSeat(hand) {
      const classes = ['seat'];
      if (hand.isPlayer) classes.push('player-seat');
      if (hand.isDealer) classes.push('dealer-seat');
      if (hand.winner) classes.push('winner');
      if (hand.push) classes.push('push');
      if (hand.busted) classes.push('bust');

      const hideDealerHoleCard = hand.isDealer && state.dealerHoleHidden;
      const displayedCards = hand.cards.map((card, index) => {
        if (hideDealerHoleCard && index === 1) {
          return renderCard(null, true);
        }
        return renderCard(card);
      }).join('');

      const shownScore = hideDealerHoleCard
        ? calculateVisibleDealerScore(hand)
        : hand.score;

      const bustLabel = hand.busted ? ' — BUST' : '';
      const blackjackLabel = hand.blackjack && !hideDealerHoleCard ? ' — BLACKJACK' : '';

      return `
        <section class="${classes.join(' ')}">
          <div class="seat-header">
            <div class="seat-title">${hand.name}${bustLabel}${blackjackLabel}</div>
            <div class="seat-score">Score: ${shownScore}</div>
          </div>
          <div class="cards">${displayedCards}</div>
        </section>
      `;
    }

    function calculateVisibleDealerScore(hand) {
      if (!hand.cards.length) return 0;
      const firstCard = hand.cards[0];
      return firstCard.value;
    }

    function renderTable() {
      if (!state.player || !state.dealer) {
        tableArea.innerHTML = '';
        return;
      }

      tableArea.innerHTML = [
        renderSeat(state.dealer),
        renderSeat(state.player)
      ].join('');
    }

    function setControlsEnabled(enabled) {
      hitBtn.disabled = !enabled;
      standBtn.disabled = !enabled;
    }

    function updateTimerDisplay() {
      timerValue.textContent = String(state.timer);
      if (state.timer <= 10 && state.roundActive) {
        countdownOverlay.textContent = String(state.timer);
        countdownOverlay.classList.add('show');
      } else {
        countdownOverlay.classList.remove('show');
      }
    }

    function clearRoundTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      countdownOverlay.classList.remove('show');
    }

    function startRoundTimer() {
      clearRoundTimer();
      state.timer = 30;
      updateTimerDisplay();

      state.timerId = setInterval(() => {
        state.timer -= 1;
        updateTimerDisplay();

        if (state.timer <= 0) {
          clearRoundTimer();
          if (state.roundActive && !state.roundResolved) {
            statusText.textContent = 'Time ran out, so you automatically stood.';
            playerStand(true);
          }
        }
      }, 1000);
    }

    function resetRoundFlags() {
      if (state.player) {
        state.player.winner = false;
        state.player.push = false;
      }
      if (state.dealer) {
        state.dealer.winner = false;
        state.dealer.push = false;
      }
      state.result = null;
    }

    function startGame() {
      state.deck = createDeck();
      state.player = createHand('You', true, false);
      state.dealer = createHand('Dealer', false, true);
      calculateScore(state.player);
      calculateScore(state.dealer);
      state.roundActive = true;
      state.roundResolved = false;
      state.dealerHoleHidden = true;
      resetRoundFlags();

      setControlsEnabled(true);
      messageBox.textContent = 'Round in progress. Choose Hit or Stand.';
      statusText.textContent = 'Dealer shows one card. You have 30 seconds to decide.';
      renderTable();

      if (state.player.blackjack || state.dealer.blackjack) {
        resolveNaturals();
        return;
      }

      startRoundTimer();
    }

    function resolveNaturals() {
      state.dealerHoleHidden = false;
      state.roundActive = false;
      state.roundResolved = true;
      setControlsEnabled(false);
      clearRoundTimer();

      if (state.player.blackjack && state.dealer.blackjack) {
        state.result = 'tie';
        state.player.push = true;
        state.dealer.push = true;
        messageBox.textContent = 'You tied';
        statusText.textContent = 'Both you and the dealer have blackjack.';
      } else if (state.player.blackjack) {
        state.result = 'win';
        state.player.winner = true;
        messageBox.textContent = 'Congrats, you won!';
        statusText.textContent = 'Blackjack! Your natural 21 beats the dealer.';
      } else {
        state.result = 'lose';
        state.dealer.winner = true;
        messageBox.textContent = 'Better luck next time!';
        statusText.textContent = 'Dealer has blackjack.';
      }

      renderTable();
    }

    function playerHit() {
      if (!state.roundActive || state.roundResolved) return;

      state.player.cards.push(drawCard());
      calculateScore(state.player);
      renderTable();

      if (state.player.busted) {
        state.dealerHoleHidden = false;
        state.roundActive = false;
        state.roundResolved = true;
        setControlsEnabled(false);
        clearRoundTimer();
        state.result = 'lose';
        state.dealer.winner = true;
        messageBox.textContent = 'Better luck next time!';
        statusText.textContent = 'You busted, so the dealer wins.';
        renderTable();
      }
    }

    function dealerPlay() {
      state.dealerHoleHidden = false;
      calculateScore(state.dealer);
      while (state.dealer.score < 17) {
        state.dealer.cards.push(drawCard());
        calculateScore(state.dealer);
      }
    }

    function settleRound(autoStood = false) {
      state.roundActive = false;
      state.roundResolved = true;
      setControlsEnabled(false);
      clearRoundTimer();
      resetRoundFlags();

      dealerPlay();
      calculateScore(state.player);
      calculateScore(state.dealer);

      if (state.dealer.busted) {
        state.result = 'win';
        state.player.winner = true;
        messageBox.textContent = 'Congrats, you won!';
        statusText.textContent = autoStood
          ? 'Time expired, you stood automatically, and the dealer busted.'
          : 'The dealer busted.';
      } else if (state.player.score > state.dealer.score) {
        state.result = 'win';
        state.player.winner = true;
        messageBox.textContent = 'Congrats, you won!';
        statusText.textContent = autoStood
          ? 'Time expired, you stood automatically, and your hand beat the dealer.'
          : 'Your hand beat the dealer.';
      } else if (state.player.score < state.dealer.score) {
        state.result = 'lose';
        state.dealer.winner = true;
        messageBox.textContent = 'Better luck next time!';
        statusText.textContent = autoStood
          ? 'Time expired, you stood automatically, and the dealer had the higher hand.'
          : 'The dealer had the higher hand.';
      } else {
        state.result = 'tie';
        state.player.push = true;
        state.dealer.push = true;
        messageBox.textContent = 'You tied';
        statusText.textContent = autoStood
          ? 'Time expired, you stood automatically, and the round ended in a tie.'
          : 'You and the dealer have the same total.';
      }

      renderTable();
    }

    function playerStand(autoStood = false) {
      if (!state.roundActive || state.roundResolved) return;
      settleRound(autoStood);
    }

    function runTests() {
      const assert = (condition, description) => {
        if (!condition) {
          throw new Error(`Test failed: ${description}`);
        }
      };

      const makeHand = (cards) => ({
        cards,
        score: 0,
        busted: false,
        blackjack: false,
        winner: false,
        push: false
      });

      const aceHand = makeHand([
        { rank: 'A', value: 11 },
        { rank: '9', value: 9 }
      ]);
      assert(calculateScore(aceHand) === 20, 'Ace should count as 11 when safe');

      const softAceHand = makeHand([
        { rank: 'A', value: 11 },
        { rank: '9', value: 9 },
        { rank: '5', value: 5 }
      ]);
      assert(calculateScore(softAceHand) === 15, 'Ace should drop to 1 to avoid bust');

      const blackjackHand = makeHand([
        { rank: 'A', value: 11 },
        { rank: 'K', value: 10 }
      ]);
      calculateScore(blackjackHand);
      assert(blackjackHand.blackjack === true, 'Two-card 21 should be blackjack');

      const nonBlackjackTwentyOne = makeHand([
        { rank: '7', value: 7 },
        { rank: '7', value: 7 },
        { rank: '7', value: 7 }
      ]);
      calculateScore(nonBlackjackTwentyOne);
      assert(nonBlackjackTwentyOne.blackjack === false, 'Three-card 21 should not be blackjack');

      const visibleDealer = makeHand([
        { rank: 'Q', value: 10 },
        { rank: '5', value: 5 }
      ]);
      assert(calculateVisibleDealerScore(visibleDealer) === 10, 'Visible dealer score should show only the upcard');

      state.player = makeHand([{ rank: '10', value: 10 }, { rank: '9', value: 9 }]);
      state.dealer = makeHand([{ rank: '10', value: 10 }, { rank: '7', value: 7 }]);
      calculateScore(state.player);
      calculateScore(state.dealer);
      resetRoundFlags();
      assert(state.player.winner === false && state.dealer.winner === false, 'Winner flags should reset cleanly');

      state.player = null;
      state.dealer = null;
    }

    runTests();

    startGameBtn.addEventListener('click', startGame);
    hitBtn.addEventListener('click', playerHit);
    standBtn.addEventListener('click', () => playerStand(false));

    updateTimerDisplay();
  </script>
</body>
</html>
